# Reverse proxy publik untuk container osTicket TRAMOS.
# TLS production dilayani pada port lokal 30443 agar tidak mengambil port 443
# yang sudah digunakan layanan client.

server {
    listen 80;
    listen [::]:80;
    server_name helpdesk.tramos.systems;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:30443 ssl;
    http2 on;
    server_name helpdesk.tramos.systems;

    ssl_certificate /etc/letsencrypt/live/helpdesk.tramos.systems/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpdesk.tramos.systems/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TRAMOS_HELPDESK_SSL:10m;
    ssl_session_timeout 1d;

    # osTicket (Apache container)
    location / {
        proxy_pass http://127.0.0.1:30081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # Dashboard TRAMOS (Nginx static container)
    location = /dashboard {
        return 301 /dashboard/;
    }

    location ^~ /dashboard/ {
        proxy_pass http://127.0.0.1:30080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # Backend API TRAMOS (FastAPI container)
    # Proxy /dashboard-api/* → backend /* (tanpa /api/)
    # sehingga /dashboard-api/auth/status → backend /auth/status
    # /dashboard-api/api/kb/search → backend /api/kb/search
    location ^~ /dashboard-api/ {
        proxy_pass http://127.0.0.1:9999/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

}
