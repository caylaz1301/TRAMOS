name: tramos

services:
  ollama:
    image: ollama/ollama:latest
    container_name: tramos-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TRAMOS_OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - tramos_ollama_data:/root/.ollama

  backend:
    environment:
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:4b}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-2560}
    depends_on:
      - ollama

volumes:
  tramos_ollama_data:
