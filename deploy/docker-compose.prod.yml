name: tramos

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: tramos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TRAMOS_POSTGRES_DB:-tramos_db}
      POSTGRES_USER: ${TRAMOS_POSTGRES_USER:-tramos}
      POSTGRES_PASSWORD: ${TRAMOS_POSTGRES_PASSWORD:?set TRAMOS_POSTGRES_PASSWORD in env.production}
    ports:
      - "127.0.0.1:${TRAMOS_POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - tramos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRAMOS_POSTGRES_USER:-tramos} -d ${TRAMOS_POSTGRES_DB:-tramos_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tramos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${TRAMOS_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - tramos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: tramos-backend:latest
    container_name: tramos-backend
    restart: unless-stopped
    env_file:
      - ${TRAMOS_ENV_FILE:-./env.production}
    environment:
      DATABASE_URL: postgresql://${TRAMOS_POSTGRES_USER:-tramos}:${TRAMOS_POSTGRES_PASSWORD}@postgres:5432/${TRAMOS_POSTGRES_DB:-tramos_db}
      ENVIRONMENT: production
      DEBUG: "false"
      PORT: 9999
    ports:
      - "127.0.0.1:${TRAMOS_BACKEND_HOST_PORT:-9999}:9999"
    volumes:
      - ../knowledge_base:/app/knowledge_base:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9999/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  tramos_postgres_data:
  tramos_redis_data:
